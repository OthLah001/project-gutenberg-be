apiVersion: batch/v1
kind: Job
metadata:
  name: gutenberg-migrate
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: migrate
        image: localhost:5000/gutenberg-backend:local
        imagePullPolicy: Never
        command: ["python", "manage.py", "migrate", "--noinput"]
        envFrom:
        - configMapRef:
            name: gutenberg-configmap
        - secretRef:
            name: gutenberg-secrets
