apiVersion: v1
kind: Secret
metadata:
  name: gutenberg-secrets
type: Opaque
stringData:
  SECRET_KEY: DJANGO_SECRET_KEY_BASE64
  POSTGRES_DB: POSTGRES_DB_BASE64
  POSTGRES_USER: POSTGRES_USER_BASE64
  POSTGRES_PASSWORD: POSTGRES_PASSWORD_BASE64
  DATABASE_URL: postgres://POSTGRES_USER:POSTGRES_PASSWORD@gutenberg-postgres-service:5432/POSTGRES_DB
  GROQ_API_KEY: GROQ_API_KEY_BASE64
  GEMINI_API_KEY: GEMINI_API_KEY_BASE64
  OTEL_EXPORTER_OTLP_TOKEN: OTEL_EXPORTER_OTLP_TOKEN_BASE64