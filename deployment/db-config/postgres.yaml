apiVersion: v1
kind: Service
metadata:
  name: gutenberg-postgres-service
  labels:
    app: postgres-app
spec:
  ports:
  - port: 5432
    name: postgres
  clusterIP: None
  selector:
    app: postgres-app
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: gutenberg-postgres
spec:
  selector:
    matchLabels:
      app: postgres-app
  serviceName: "gutenberg-postgres-service"
  replicas: 1
  minReadySeconds: 10
  template:
    metadata:
      labels:
        app: postgres-app
    spec:
      terminationGracePeriodSeconds: 10
      containers:
      - name: postgres-db
        image: pgvector/pgvector:pg16
        ports:
        - containerPort: 5432
          name: postgres
        env:
          - name: POSTGRES_DB
            valueFrom:
              secretKeyRef:
                name: gutenberg-secrets
                key: POSTGRES_DB
          - name: POSTGRES_USER
            valueFrom:
              secretKeyRef:
                name: gutenberg-secrets
                key: POSTGRES_USER
          - name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: gutenberg-secrets
                key: POSTGRES_PASSWORD
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: postgres-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "gutenberg-postgres-storage"
      resources:
        requests:
          storage: 1Gi